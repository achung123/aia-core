#
# PLACEHOLDER LEGEND
# ==================
# {{ROUTE_NAME}}          Required. Human name. e.g. "Game"
# {{ROUTE_DESCRIPTION}}   Required. What this router covers in poker terms.
# {{BASE_PATH}}           Required. Router prefix. e.g. "/game"
# {{VERSION}}             Required. API version string. e.g. "1.0.0"
#
# USAGE NOTES
# ===========
# - Replace ALL {{PLACEHOLDER}} values with real data
# - Remove all lines starting with # in the final output
# - Add/remove path blocks as needed — one block per endpoint
# - Add/remove schema blocks as needed — one block per Pydantic model used

openapi: "3.0.3"
info:
  title: "{{ROUTE_NAME}} — AIA Core API"
  version: "{{VERSION}}"
  description: "{{ROUTE_DESCRIPTION}}"

paths:

  # ── Endpoint block — repeat for each route ──────────────────────────────
  "{{BASE_PATH}}/{{PATH_SEGMENT}}":

    get:  # Replace with: get | post | put | delete | patch
      summary: "{{ENDPOINT_SUMMARY}}"
      description: "{{ENDPOINT_DESCRIPTION}}"
      operationId: "{{OPERATION_ID}}"
      tags:
        - "{{TAG}}"

      # Path and query parameters — include only what applies
      parameters:
        - name: "{{PARAM_NAME}}"
          in: path  # path | query | header
          required: true
          schema:
            type: "string"  # string | integer | boolean | number
          description: "{{PARAM_DESCRIPTION}}"

      responses:
        "200":
          description: "{{SUCCESS_DESCRIPTION}}"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/{{RESPONSE_SCHEMA_REF}}"
              example:
                # paste a realistic JSON example here
                field: value

        "404":
          description: "Not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPError"

        "422":
          description: "Validation error"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"

    post:  # Include only if the path supports POST
      summary: "{{ENDPOINT_SUMMARY}}"
      description: "{{ENDPOINT_DESCRIPTION}}"
      operationId: "{{OPERATION_ID}}"
      tags:
        - "{{TAG}}"

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/{{REQUEST_SCHEMA_REF}}"
            example:
              # paste a realistic request JSON example here
              field: value

      responses:
        "201":
          description: "{{CREATED_DESCRIPTION}}"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/{{RESPONSE_SCHEMA_REF}}"

        "422":
          description: "Validation error"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"

  # ── Add more path blocks above this line ────────────────────────────────

components:
  schemas:

    # ── Domain schema — repeat for each Pydantic model used ───────────────
    "{{SCHEMA_NAME}}":
      type: object
      description: "{{SCHEMA_DESCRIPTION}}"
      required:
        - "{{REQUIRED_FIELD_1}}"
        # add more required fields
      properties:
        "{{FIELD_NAME}}":
          type: "{{FIELD_TYPE}}"  # string | integer | boolean | number | array | object
          description: "{{FIELD_DESCRIPTION}}"
          example: "{{FIELD_EXAMPLE}}"

        "{{OPTIONAL_FIELD_NAME}}":
          type: "{{FIELD_TYPE}}"
          nullable: true
          description: "{{FIELD_DESCRIPTION}}"
          example: null

    # ── Standard error schemas — include in every OpenAPI output ──────────
    HTTPError:
      type: object
      properties:
        detail:
          type: string
          description: "Human-readable error message"
          example: "Game session not found"

    ValidationError:
      type: object
      properties:
        detail:
          type: array
          items:
            type: object
            properties:
              loc:
                type: array
                items:
                  type: string
                description: "Location of the validation error (field path)"
              msg:
                type: string
                description: "Human-readable validation message"
              type:
                type: string
                description: "Pydantic error type code"
