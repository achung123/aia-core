services:
  backend:
    profiles: ["cpu"]
    build: .
    ports:
      - "8000:8000"
    volumes: &backend-volumes
      - ./src:/app/src
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./pyproject.toml:/app/pyproject.toml
      - ./uv.lock:/app/uv.lock
      - ./docker-entrypoint.sh:/app/docker-entrypoint.sh
      - ./scripts:/app/scripts
      - ./models:/app/models
      - ./poker.db:/app/poker.db
      - ./uploads:/app/uploads
    environment: &backend-env
      - PYTHONPATH=/app/src
      - DATABASE_URL=sqlite:///./poker.db
      - SEED_DATA=0
      - ALLOWED_ORIGINS=http://localhost:5173,http://0.0.0.0:5173,http://127.0.0.1:5173
    working_dir: /app

  # GPU-accelerated backend — use: docker compose --profile gpu up
  backend-gpu:
    profiles: ["gpu"]
    build:
      context: .
      dockerfile: Dockerfile.gpu
    ports:
      - "8000:8000"
    volumes: *backend-volumes
    environment: *backend-env
    working_dir: /app
    networks:
      default:
        aliases:
          - backend
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/public:/app/public
      - ./frontend/vite.config.js:/app/vite.config.js

  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate --protocol http2 --url http://frontend:5173
    restart: unless-stopped
    depends_on:
      - frontend
