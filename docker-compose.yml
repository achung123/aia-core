services:
  # --- mDNS BROADCASTER ---
  # Advertises "aia.local" on your LAN via Avahi/mDNS so phones and laptops
  # can reach the app at http://aia.local without knowing the WSL IP.
  # Requires host networking — WSL users see notes in docs/local-network-setup.md.
  mdns:
    image: flungo/avahi
    container_name: aia-mdns
    restart: unless-stopped
    network_mode: host
    environment:
      - AF_HOSTNAME=aia   # advertises as http://aia.local

  # --- REVERSE PROXY ---
  # Nginx Proxy Manager listens on port 80 and routes traffic to the frontend
  # and backend containers so clients only need http://aia.local (no port numbers).
  # Web admin UI is available at http://localhost:81 (default creds: admin@example.com / changeme).
  # See docs/local-network-setup.md for the proxy-host configuration steps.
  proxy:
    image: jc21/nginx-proxy-manager:latest
    container_name: aia-proxy
    restart: unless-stopped
    ports:
      - "80:80"   # public HTTP — browsers hit this
      - "81:81"   # NPM admin UI
    volumes:
      - ./npm_data:/data
      - ./npm_letsencrypt:/etc/letsencrypt
    depends_on:
      - frontend
      - backend

  backend:
    profiles: ["cpu"]
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes: &backend-volumes
      - ./backend/src:/app/src
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      - ./backend/pyproject.toml:/app/pyproject.toml
      - ./backend/uv.lock:/app/uv.lock
      - ./scripts/docker/docker-entrypoint.sh:/app/docker-entrypoint.sh
      - ./scripts:/app/scripts
      - ./backend/models:/app/models
      - ./backend/poker.db:/app/poker.db
      - ./backend/uploads:/app/uploads
    environment: &backend-env
      - PYTHONPATH=/app/src
      - DATABASE_URL=sqlite:///./poker.db
      - SEED_DATA=0
      - ALLOWED_ORIGINS=http://localhost:5173,http://0.0.0.0:5173,http://127.0.0.1:5173,http://aia.local
    working_dir: /app

  # GPU-accelerated backend — use: docker compose --profile gpu up
  backend-gpu:
    profiles: ["gpu"]
    build:
      context: .
      dockerfile: backend/Dockerfile.gpu
    ports:
      - "8000:8000"
    volumes: *backend-volumes
    environment: *backend-env
    working_dir: /app
    networks:
      default:
        aliases:
          - backend
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/public:/app/public
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
