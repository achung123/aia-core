services:
  backend:
    profiles: ["cpu"]
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes: &backend-volumes
      - ./backend/src:/app/src
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      - ./backend/pyproject.toml:/app/pyproject.toml
      - ./backend/uv.lock:/app/uv.lock
      - ./scripts/docker/docker-entrypoint.sh:/app/docker-entrypoint.sh
      - ./scripts:/app/scripts
      - ./backend/models:/app/models
      - ./backend/poker.db:/app/poker.db
      - ./backend/uploads:/app/uploads
    environment: &backend-env
      - PYTHONPATH=/app/src
      - DATABASE_URL=sqlite:///./poker.db
      - SEED_DATA=0
      - ALLOWED_ORIGINS=http://localhost:5173,http://0.0.0.0:5173,http://127.0.0.1:5173
    working_dir: /app

  # GPU-accelerated backend — use: docker compose --profile gpu up
  backend-gpu:
    profiles: ["gpu"]
    build:
      context: .
      dockerfile: backend/Dockerfile.gpu
    ports:
      - "8000:8000"
    volumes: *backend-volumes
    environment: *backend-env
    working_dir: /app
    networks:
      default:
        aliases:
          - backend
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/public:/app/public
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
