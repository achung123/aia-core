server {
    listen 80;
    server_name aia.local _;

    # Allow iPhone/DSLR card photos (backend enforces its own 10 MB cap on
    # /games/*/hands/image). Default nginx limit is 1 MB, which silently 413s
    # multi-megabyte photos before they reach Vite → backend.
    client_max_body_size 20m;

    # Frontend — Vite dev server
    location / {
        proxy_pass http://frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # WebSocket support (Vite HMR)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
